name: Recipe Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: recipe-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  notebooks:
    name: Run recipe notebooks on Gadi
    runs-on: [self-hosted, linux, gadi]
    timeout-minutes: 720
    env:
      MODULEPATH_ROOT: /g/data/xp65/public/modules
      ANALYSIS_MODULE: conda/analysis3
      PBS_PROJECT: v46
      PBS_QUEUE: normal
      PBS_STORAGE: gdata/xp65+gdata/ik11+gdata/cj50+gdata/ol01+gdata/v46
      PBS_NCPUS: '28'
      PBS_MEM: 126GB
      PBS_WALLTIME: '10:00:00'
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Submit notebook tests
        shell: bash -l {0}
        run: |
          set -euo pipefail

          mkdir -p .ci
          rm -f .ci/recipe_notebooks.log .ci/recipe_notebooks.live.log .ci/recipe_notebooks.exit

          job_id=""
          cleanup_pbs_job() {
            if [ -n "${job_id}" ] && qstat "${job_id}" >/dev/null 2>&1; then
              echo "Canceling PBS job ${job_id}"
              qdel "${job_id}" || true
            fi
          }
          trap 'cleanup_pbs_job; exit 130' INT TERM

          cat > .ci/run_recipe_notebooks.pbs <<PBS
          #!/bin/bash
          #PBS -N recipe_notebooks
          #PBS -P ${PBS_PROJECT}
          #PBS -q ${PBS_QUEUE}
          #PBS -l ncpus=${PBS_NCPUS}
          #PBS -l mem=${PBS_MEM}
          #PBS -l walltime=${PBS_WALLTIME}
          #PBS -l storage=${PBS_STORAGE}
          #PBS -l wd
          #PBS -j oe
          #PBS -o .ci/recipe_notebooks.log

          set -euo pipefail

          exec > >(stdbuf -oL tee -a .ci/recipe_notebooks.live.log) 2>&1

          finish() {
            status=\$?
            echo "\${status}" > .ci/recipe_notebooks.exit
          }
          trap finish EXIT

          if [ -f /etc/profile.d/modules.sh ]; then
            source /etc/profile.d/modules.sh
          fi

          module use "${MODULEPATH_ROOT}"
          module load "${ANALYSIS_MODULE}"

          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -s --tb=short -ra test/test_notebooks.py
          PBS

          job_id="$(qsub .ci/run_recipe_notebooks.pbs)"
          echo "Submitted PBS job ${job_id}"

          last_log_line=0
          while qstat "${job_id}" >/dev/null 2>&1; do
            date -u '+PBS job still active at %Y-%m-%dT%H:%M:%SZ'
            qstat -f "${job_id}" | awk '
              /Job_Owner =/ || /^    project =/ || /job_state =/ || /queue =/ || /resources_used.walltime =/ || /resources_used.mem =/ || /resources_used.cpupercent =/ || /exec_host =/ { print }
            '
            if [ -f .ci/recipe_notebooks.live.log ]; then
              current_log_line="$(wc -l < .ci/recipe_notebooks.live.log)"
              if [ "${current_log_line}" -gt "${last_log_line}" ]; then
                echo "--- new PBS output ---"
                sed -n "$((last_log_line + 1)),${current_log_line}p" .ci/recipe_notebooks.live.log
                echo "--- end new PBS output ---"
                last_log_line="${current_log_line}"
              fi
            fi
            sleep 60
          done

          if [ -f .ci/recipe_notebooks.live.log ]; then
            current_log_line="$(wc -l < .ci/recipe_notebooks.live.log)"
            if [ "${current_log_line}" -gt "${last_log_line}" ]; then
              echo "--- final PBS output ---"
              sed -n "$((last_log_line + 1)),${current_log_line}p" .ci/recipe_notebooks.live.log
              echo "--- end final PBS output ---"
            fi
          elif [ -f .ci/recipe_notebooks.log ]; then
            cat .ci/recipe_notebooks.log
          else
            echo "PBS output file .ci/recipe_notebooks.live.log was not found"
          fi

          if [ ! -f .ci/recipe_notebooks.exit ]; then
            echo "PBS job did not write .ci/recipe_notebooks.exit"
            exit 1
          fi

          exit "$(cat .ci/recipe_notebooks.exit)"
