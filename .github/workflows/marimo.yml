name: Marimo Checks
on:
  push:
  pull_request:
    types: [synchronize, opened]
jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-marimo
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "marimo>=0.23,<0.24"
      - name: Ensure marimo notebooks are valid (no NCI data required)
        run: |
          marimo check --strict \
            01-Cooking-Tutorials \
            02-Easy-Recipes \
            03-Advanced-Recipes \
            04-Regional-Specialties
